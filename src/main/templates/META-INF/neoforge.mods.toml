# WoodDye — neoforge.mods.toml (values are expanded from gradle.properties at build time).
modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="https://github.com/Sablednah/WoodDye-NeoForge/issues"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''
${mod_description}
'''
displayURL="https://github.com/Sablednah/WoodDye-NeoForge"
logoFile="wooddye.png"
logoBlur=false

# WoodDye is a common (server + client) mod. Blocks render from data-driven JSON, so no
# client-only entrypoint is required; it runs fully on dedicated servers and vanilla clients.

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"
